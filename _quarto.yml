
project:
  type: website
  output-dir: docs

website:
  title: "Pierre Smith - Expert en santé publique"

  # 1) IMPORTANT pour Google + sitemap + partage
  site-url: "https://pierre-w-smith.github.io/mon_site/"

  # 2) Meta description (apparaît souvent dans Google)
  description: "Site personnel de Pierre Smith : recherches en santé publique, projets, publications et CV."

  navbar:
    left:
      - text: "Accueil"
        href: index.qmd
      - text: "Publications"
        href: publications.qmd
      - text: "Projets"
        href: projets.qmd
      - text: "Tableaux de bord santé"
        href: tableaubord.qmd
      - text: "À propos de moi"
        href: apropos.qmd
    right:
      - text: "📄 Télécharger mon CV"
        href: file/CV.pdf
        target: _blank

  page-footer:
    right: "Dernière mise à jour : 29/04/2026"

format:
  html:
    theme: cosmo

    # 3) Accessibilité + SEO “technique”
    lang: fr

    # 4) Améliore l’aperçu lors du partage (LinkedIn, WhatsApp, etc.)
    open-graph: true
    twitter-card: true

    # 5) Petit plus accessibilité (navigation clavier)
